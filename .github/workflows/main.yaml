name: install-test

on:
  push:
  workflow_dispatch:
  pull_request:
    branches: master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ocaml-compiler:
          - 5.4.0
          - 4.14.0
    steps:
      - uses: actions/checkout@v2
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
      - name: Install
        run: |
          sudo apt-get install libonig-dev
          opam install . -t
